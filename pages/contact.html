    <main>
        <section>
            <h1>Contacto</h1>
            <p>¿Tienes preguntas? Contáctanos.</p>
            <form action="#" method="post">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" rows="4" required></textarea>
                
                <fieldset>
                    <legend>Estoy interesado en:</legend>
                    <label><input type="checkbox" name="interest" value="tournaments"> Torneos</label>
                    <label><input type="checkbox" name="interest" value="news"> Noticias</label>
                </fieldset>
                
                <button type="submit">Enviar</button>
            </form>
        </section>
        <aside>
